# New-API production Docker Compose for Aliyun ECS + RDS
#
# Quick Start:
#   1. Fill .env in this directory.
#   2. docker compose up -d
#   3. Access at http://<ecs-public-ip>:8888
#
# Notes:
#   - MySQL is provided by Aliyun RDS through SQL_DSN.
#   - Redis still runs locally in Docker.
#   - If Docker Hub is blocked, configure Docker registry mirrors first:
#     docs/aliyun-ecs-deploy.md

services:
  new-api:
    image: ${NEW_API_IMAGE:-docker.io/calciumion/new-api:latest}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=${SQL_DSN:?SQL_DSN is required}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://:${REDIS_PASSWORD:-123456}@redis:6379/0}
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - NODE_NAME=${NODE_NAME:-aliyun-ecs-new-api-1}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
#      - STREAMING_TIMEOUT=300
#      - SYNC_FREQUENCY=60
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js
    depends_on:
      - redis
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: ${REDIS_IMAGE:-docker.io/library/redis:7-alpine}
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    volumes:
      - redis_data:/data
    networks:
      - new-api-network

volumes:
  redis_data:

networks:
  new-api-network:
    driver: bridge
